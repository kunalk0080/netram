# Render Blueprint — single service that builds the React frontend and serves it
# from the Express API. Must live at the repo root for Render to auto-detect it.
#
# Runs with ZERO setup: with no MONGO_URI, the server uses an ephemeral in-memory
# database (data resets on restart). Add MONGO_URI later for real persistence.
services:
  - type: web
    name: netram
    runtime: node
    plan: free
    buildCommand: cd frontend && npm install && npm run build && cd ../backend && npm install
    startCommand: node backend/src/server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "20"
      # Optional — leave unset to use the in-memory DB. Set to a MongoDB Atlas
      # URI later for persistent data.
      - key: MONGO_URI
        sync: false
      # Optional — paste Firebase service-account JSON later to verify real
      # login tokens. Unset = built-in demo auth (any number/email logs in).
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
